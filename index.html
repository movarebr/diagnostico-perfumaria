<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Diagnóstico MOVARE · Sua perfumaria está perdendo dinheiro?</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #1A0A0A;
      color: #2A2A2A;
      line-height: 1.5;
      padding: 0 0 24px;
      min-height: 100vh;
      position: relative;
    }

    /* Background elegante com efeito de perfume/lençol */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(circle at 30% 40%, rgba(180, 30, 30, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 70% 60%, rgba(139, 0, 0, 0.12) 0%, transparent 60%),
        radial-gradient(circle at 50% 80%, rgba(200, 50, 50, 0.08) 0%, transparent 50%),
        linear-gradient(135deg, 
          #0D0505 0%,
          #1A0808 25%,
          #220A0A 50%,
          #1A0808 75%,
          #0D0505 100%
        );
      z-index: -2;
    }

    /* Efeito de lençol/tecido fluido */
    body::after {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      right: -50%;
      bottom: -50%;
      background: 
        repeating-linear-gradient(
          45deg,
          transparent,
          transparent 80px,
          rgba(139, 0, 0, 0.03) 80px,
          rgba(139, 0, 0, 0.03) 160px
        ),
        radial-gradient(ellipse at 40% 50%, rgba(180, 40, 40, 0.08) 0%, transparent 70%);
      transform: rotate(-15deg);
      z-index: -1;
      animation: flowFabric 30s ease-in-out infinite;
    }

    @keyframes flowFabric {
      0%, 100% { transform: rotate(-15deg) scale(1); }
      50% { transform: rotate(-12deg) scale(1.02); }
    }

    /* Silhueta sutil de perfume */
    .perfume-silhouette {
      position: fixed;
      bottom: 0;
      right: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -1;
      opacity: 0.06;
      background: 
        radial-gradient(ellipse at 80% 100%, rgba(200, 60, 60, 0.3) 0%, transparent 60%),
        url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 400"><path fill="%238B0000" d="M100 380 L60 200 Q55 160 70 120 Q85 80 100 60 Q115 80 130 120 Q145 160 140 200 Z"/><rect x="85" y="40" width="30" height="30" rx="5" fill="%238B0000"/><rect x="90" y="10" width="20" height="35" rx="3" fill="%238B0000"/></svg>');
      background-repeat: no-repeat;
      background-position: 85% 90%;
      background-size: 300px 500px;
    }

    .app {
      max-width: 600px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(139, 0, 0, 0.2);
      border-radius: 32px 32px 24px 24px;
      overflow: hidden;
      position: relative;
      z-index: 10;
    }

    /* Header elegante com transparência */
    .hero {
      background: linear-gradient(135deg, #1A0808 0%, #0D0505 100%);
      padding: 32px 24px 24px;
      color: white;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(139, 0, 0, 0.3) 0%, transparent 70%);
      border-radius: 50%;
    }

    .hero-accent {
      height: 4px;
      background: linear-gradient(90deg, #8B0000 0%, #CC3333 50%, #8B0000 100%);
      width: 80px;
      margin-bottom: 20px;
      position: relative;
      z-index: 2;
    }

    h1, h2, h3, .serif-title {
      font-family: 'Cinzel', serif;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .hero h1 {
      font-size: 2.2rem;
      line-height: 1.2;
      margin-bottom: 12px;
      color: white;
      position: relative;
      z-index: 2;
      text-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    }

    .hero .sub {
      font-family: 'Montserrat', sans-serif;
      font-weight: 400;
      font-size: 1rem;
      color: #E0C0C0;
      border-left: 3px solid #8B0000;
      padding-left: 16px;
      margin: 20px 0 8px;
      position: relative;
      z-index: 2;
    }

    .badge-movare {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 20px;
      position: relative;
      z-index: 2;
    }

    .badge-movare span {
      font-family: 'Cinzel', serif;
      font-weight: 600;
      letter-spacing: 3px;
      color: #FFFFFF;
      font-size: 1.3rem;
    }

    .badge-movare small {
      font-size: 0.75rem;
      opacity: 0.9;
      color: #CC9999;
    }

    .progress-container {
      background: rgba(26, 8, 8, 0.95);
      backdrop-filter: blur(5px);
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(139, 0, 0, 0.3);
    }

    .steps {
      display: flex;
      gap: 6px;
    }

    .step-dot {
      width: 10px;
      height: 10px;
      border-radius: 10px;
      background: #5A3A3A;
      transition: all 0.3s;
    }

    .step-dot.active {
      background: #8B0000;
      width: 24px;
      box-shadow: 0 0 10px rgba(139, 0, 0, 0.5);
    }

    .step-dot.completed {
      background: #8B0000;
    }

    .progress-text {
      color: #E0C0C0;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .quiz-section {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(5px);
      padding: 28px 24px 32px;
      border-radius: 0 0 0 0;
    }

    .block-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 24px;
      border-bottom: 2px solid rgba(139, 0, 0, 0.15);
      padding-bottom: 16px;
    }

    .block-title {
      font-family: 'Cinzel', serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: #1A0808;
      letter-spacing: -0.01em;
    }

    .block-score {
      font-weight: 700;
      color: #8B0000;
      background: linear-gradient(135deg, #FDF0F0, #F9E0E0);
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 1rem;
      border: 1px solid rgba(139, 0, 0, 0.1);
    }

    .question-card {
      margin-bottom: 28px;
    }

    .question-text {
      font-weight: 600;
      font-size: 1.1rem;
      margin-bottom: 18px;
      color: #1A0808;
    }

    .toggle-group {
      display: flex;
      gap: 12px;
    }

    .toggle-btn {
      flex: 1;
      background: #F5F0F0;
      border: 2px solid transparent;
      padding: 14px 0;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1.1rem;
      color: #4A2A2A;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      font-family: 'Montserrat', sans-serif;
    }

    .toggle-btn:hover {
      background: #E8D8D8;
    }

    .toggle-btn.selected {
      background: #8B0000;
      color: white;
      border-color: #8B0000;
      box-shadow: 0 4px 12px rgba(139, 0, 0, 0.3);
    }

    .toggle-btn.sim.selected {
      background: #1A8B00;
      border-color: #1A8B00;
      box-shadow: 0 4px 12px rgba(26, 139, 0, 0.3);
    }

    .toggle-btn.nao.selected {
      background: #8B0000;
      border-color: #8B0000;
    }

    .nav-buttons {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }

    .btn {
      padding: 16px 20px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1rem;
      border: none;
      cursor: pointer;
      font-family: 'Montserrat', sans-serif;
      transition: all 0.2s;
      text-align: center;
      flex: 1;
    }

    .btn-primary {
      background: linear-gradient(135deg, #8B0000, #6B0000);
      color: white;
      box-shadow: 0 6px 16px rgba(139, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, #A00000, #7B0000);
      transform: translateY(-1px);
    }

    .btn-outline {
      background: transparent;
      border: 2px solid #8B0000;
      color: #8B0000;
      font-weight: 600;
    }

    .btn-outline:hover {
      background: rgba(139, 0, 0, 0.05);
    }

    .btn-secondary {
      background: #2A1A1A;
      color: white;
      border: 1px solid rgba(139, 0, 0, 0.3);
    }

    .btn:disabled {
      opacity: 0.5;
      pointer-events: none;
    }

    .result-container {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(5px);
      padding: 28px 24px 36px;
    }

    .total-score-box {
      background: linear-gradient(135deg, #1A0808, #0D0505);
      color: white;
      border-radius: 24px;
      padding: 28px 20px;
      text-align: center;
      margin-bottom: 28px;
      border: 1px solid rgba(139, 0, 0, 0.3);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    .score-number {
      font-family: 'Cinzel', serif;
      font-size: 5rem;
      font-weight: 700;
      color: #8B0000;
      background: linear-gradient(135deg, #FFF5F5, #F0E0E0);
      display: inline-block;
      padding: 8px 32px;
      border-radius: 80px;
      margin: 12px 0 8px;
      box-shadow: 0 4px 12px rgba(139, 0, 0, 0.3);
    }

    .diagnosis-level {
      font-size: 1.8rem;
      font-family: 'Cinzel', serif;
      font-weight: 700;
      margin: 16px 0 8px;
    }

    .action-cards {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin: 24px 0;
    }

    .action-item {
      background: linear-gradient(135deg, #FFF8F8, #F5EAEA);
      border-left: 6px solid #8B0000;
      padding: 16px 18px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    .whatsapp-cta {
      background: #25D366;
      color: #1A1A1A;
      border-radius: 60px;
      padding: 18px 20px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 24px 0 12px;
      text-decoration: none;
      font-size: 1.2rem;
      box-shadow: 0 6px 20px rgba(37, 211, 102, 0.3);
      transition: all 0.2s;
    }

    .whatsapp-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(37, 211, 102, 0.4);
    }

    .footer-note {
      color: #C0A0A0;
      font-size: 0.8rem;
      text-align: center;
      margin-top: 24px;
    }

    .logo-movare-mini {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: 'Cinzel', serif;
      font-weight: 600;
      color: #8B0000;
      margin-top: 20px;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 480px) {
      .hero h1 {
        font-size: 1.8rem;
      }
      .block-title {
        font-size: 1.4rem;
      }
    }

    /* Detalhe de luxo */
    .luxury-sparkle {
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
    }
  </style>
</head>
<body>
  <div class="perfume-silhouette"></div>
  
  <div class="app">
    <div class="hero">
      <div class="hero-accent"></div>
      <h1>Sua perfumaria<br>está perdendo<br>dinheiro aqui?</h1>
      <div class="sub">Checklist 32 pontos · descubra os vazamentos</div>
      <div class="badge-movare">
        <span>MOVARE</span>
        <small>— Assessoria Remota para Perfumaria</small>
      </div>
    </div>

    <div class="progress-container">
      <div class="steps" id="stepIndicators"></div>
      <div class="progress-text" id="progressLabel">Bloco 1/4</div>
    </div>

    <div id="quizArea" class="quiz-section"></div>
    <div id="resultArea" class="result-container hidden"></div>

    <div style="padding: 0 24px 24px; background: rgba(255,255,255,0.95);" id="navFooter">
      <div class="nav-buttons" id="navButtons"></div>
    </div>
    <div class="footer-note">
      MOVARE · Assessoria Remota para Perfumaria · @movare.br
    </div>
  </div>

<script>
  (function(){
    "use strict";

    const BLOCKS = [
      {
        title: "ATENDIMENTO",
        subtitle: "Seu atendimento encanta ou só responde?",
        questions: [
          "Respondo clientes em menos de 5 minutos no WhatsApp",
          "Tenho respostas prontas para as dúvidas mais comuns",
          "Minha equipe sabe argumentar e vender perfumes",
          "Uso o nome do cliente durante a conversa",
          "Peço feedback após cada venda",
          "Ofereço amostras ou brindes com frequência",
          "Faço follow-up 3 dias após a entrega",
          "Meu atendimento gera indicações espontâneas"
        ]
      },
      {
        title: "OPERAÇÃO",
        subtitle: "Processos ou caos?",
        questions: [
          "Tenho todos os produtos cadastrados em sistema/planilha",
          "Controle de estoque é feito semanalmente",
          "Sei exatamente o custo de cada envio",
          "Tenho fornecedores fixos e negociados",
          "Uso ERP (Tiny/Bling) ou planilha integrada",
          "Meus pedidos não atrasam por falta de organização",
          "Embalo os pedidos com padrão profissional",
          "Consigo rastrear cada venda até a entrega"
        ]
      },
      {
        title: "CONTEÚDO",
        subtitle: "Você aparece ou some?",
        questions: [
          "Posto no Instagram pelo menos 3x por semana",
          "Meu conteúdo fala de perfumes de forma envolvente",
          "Uso stories diariamente para gerar conexão",
          "Tenho uma identidade visual consistente",
          "Gravo vídeos mostrando os produtos",
          "Respondo comentários e DMs rapidamente",
          "Tenho um calendário editorial (mesmo simples)",
          "Invisto em tráfego pago com estratégia"
        ]
      },
      {
        title: "FIDELIZAÇÃO",
        subtitle: "Cliente volta ou some?",
        questions: [
          "Tenho lista de clientes VIP",
          "Envio mensagens personalizadas para recompra",
          "Ofereço desconto progressivo ou clube de assinatura",
          "Registro data de aniversário dos clientes",
          "Mantenho contato pós-venda sem ser chato",
          "Tenho um programa de fidelidade ativo",
          "Peço avaliação/publicação de fotos com produto",
          "Mais de 30% do faturamento vem de clientes recorrentes"
        ]
      }
    ];

    let currentBlockIndex = 0;
    let answers = BLOCKS.map(block => new Array(block.questions.length).fill(null));
    let quizCompleted = false;

    const quizArea = document.getElementById('quizArea');
    const resultArea = document.getElementById('resultArea');
    const navFooter = document.getElementById('navFooter');
    const navButtonsDiv = document.getElementById('navButtons');
    const stepIndicators = document.getElementById('stepIndicators');
    const progressLabel = document.getElementById('progressLabel');

    function render() {
      if (quizCompleted) {
        showResultPage();
        return;
      }
      showQuizBlock(currentBlockIndex);
      updateProgressUI();
      renderNavButtons();
    }

    function updateProgressUI() {
      const total = BLOCKS.length;
      let html = '';
      for (let i = 0; i < total; i++) {
        let cls = 'step-dot';
        if (i === currentBlockIndex) cls += ' active';
        else if (isBlockComplete(i)) cls += ' completed';
        html += `<div class="${cls}"></div>`;
      }
      stepIndicators.innerHTML = html;
      progressLabel.innerText = `Bloco ${currentBlockIndex+1}/${total} · ${BLOCKS[currentBlockIndex].title}`;
    }

    function isBlockComplete(blockIdx) {
      return answers[blockIdx].every(a => a !== null);
    }

    function calculateBlockScore(blockIdx) {
      return answers[blockIdx].filter(a => a === true).length;
    }

    function calculateTotalScore() {
      return answers.flat().filter(a => a === true).length;
    }

    function showQuizBlock(index) {
      const block = BLOCKS[index];
      const blockAnswers = answers[index];
      const blockScore = calculateBlockScore(index);
      
      let html = `
        <div class="block-header">
          <span class="block-title">${block.title}</span>
          <span class="block-score">${blockScore}/${block.questions.length}</span>
        </div>
        <p style="margin-bottom: 20px; color: #4A2A2A;">${block.subtitle}</p>
      `;

      block.questions.forEach((q, qIdx) => {
        const answer = blockAnswers[qIdx];
        const qNumber = qIdx + 1;
        html += `
          <div class="question-card">
            <div class="question-text">${qNumber}. ${q}</div>
            <div class="toggle-group">
              <div class="toggle-btn sim ${answer === true ? 'selected' : ''}" data-block="${index}" data-q="${qIdx}" data-value="true">SIM</div>
              <div class="toggle-btn nao ${answer === false ? 'selected' : ''}" data-block="${index}" data-q="${qIdx}" data-value="false">NÃO</div>
            </div>
          </div>
        `;
      });

      quizArea.innerHTML = html;

      document.querySelectorAll('.toggle-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const blockIdx = parseInt(btn.dataset.block);
          const qIdx = parseInt(btn.dataset.q);
          const value = btn.dataset.value === 'true';
          
          answers[blockIdx][qIdx] = value;
          
          showQuizBlock(blockIdx);
          updateProgressUI();
          renderNavButtons();
        });
      });
    }

    function renderNavButtons() {
      const isLast = currentBlockIndex === BLOCKS.length - 1;
      const blockComplete = isBlockComplete(currentBlockIndex);
      
      let html = '';
      if (currentBlockIndex > 0) {
        html += `<button class="btn btn-outline" id="prevBtn">← Anterior</button>`;
      } else {
        html += `<div></div>`;
      }

      if (!isLast) {
        html += `<button class="btn btn-primary" id="nextBtn" ${!blockComplete ? 'disabled' : ''}>Próximo →</button>`;
      } else {
        html += `<button class="btn btn-primary" id="finishBtn" ${!blockComplete ? 'disabled' : ''}>Ver diagnóstico 🔍</button>`;
      }

      navButtonsDiv.innerHTML = html;

      if (currentBlockIndex > 0) {
        document.getElementById('prevBtn')?.addEventListener('click', () => {
          if (currentBlockIndex > 0) {
            currentBlockIndex--;
            render();
          }
        });
      }

      if (!isLast) {
        document.getElementById('nextBtn')?.addEventListener('click', () => {
          if (blockComplete && currentBlockIndex < BLOCKS.length - 1) {
            currentBlockIndex++;
            render();
            window.scrollTo({ top: 0, behavior: 'smooth' });
          }
        });
      } else {
        document.getElementById('finishBtn')?.addEventListener('click', () => {
          if (blockComplete) {
            quizCompleted = true;
            render();
            window.scrollTo({ top: 0, behavior: 'smooth' });
          }
        });
      }
    }

    function showResultPage() {
      quizArea.classList.add('hidden');
      resultArea.classList.remove('hidden');
      navFooter.style.display = 'none';
      
      const totalScore = calculateTotalScore();
      
      let diagnosisText = '';
      let diagnosisClass = '';
      let actionSummary = '';
      
      if (totalScore <= 11) {
        diagnosisText = 'ALERTA CRÍTICO';
        diagnosisClass = '#8B0000';
        actionSummary = 'Sua perfumaria está perdendo dinheiro em várias frentes. Processos ausentes, atendimento reativo e sem dados.';
      } else if (totalScore <= 19) {
        diagnosisText = 'ATENÇÃO NECESSÁRIA';
        diagnosisClass = '#B55A00';
        actionSummary = 'Boas intenções, mas execução inconsistente. Pontos críticos travam o crescimento.';
      } else if (totalScore <= 26) {
        diagnosisText = 'EM DESENVOLVIMENTO';
        diagnosisClass = '#2A6B9C';
        actionSummary = 'No caminho certo, mas ainda há muito a ganhar. Precisa de consistência e automação.';
      } else {
        diagnosisText = 'OPERAÇÃO MADURA';
        diagnosisClass = '#1A8B00';
        actionSummary = 'Estruturada! Hora de escalar sem trabalhar mais — com a equipe certa.';
      }

      const atendimentoScore = calculateBlockScore(0);
      const operacaoScore = calculateBlockScore(1);
      const conteudoScore = calculateBlockScore(2);
      const fidelizacaoScore = calculateBlockScore(3);

      let actionsHtml = `
        <div class="action-item"><strong>📱 ATENDIMENTO (${atendimentoScore}/8)</strong><br>${atendimentoScore<5 ? 'Crie 5 respostas rápidas no WhatsApp. Treine equipe em argumentação.' : 'Ótimo! Mantenha follow-up e personalização.'}</div>
        <div class="action-item"><strong>⚙️ OPERAÇÃO (${operacaoScore}/8)</strong><br>${operacaoScore<5 ? 'Cadastre produtos no ERP Tiny/Bling. Padronize embalagens.' : 'Processos sólidos! Otimize logística.'}</div>
        <div class="action-item"><strong>📸 CONTEÚDO (${conteudoScore}/8)</strong><br>${conteudoScore<5 ? 'Poste consistentemente 1x por semana. Use stories diários.' : 'Invista em tráfego pago e vídeos.'}</div>
        <div class="action-item"><strong>🤝 FIDELIZAÇÃO (${fidelizacaoScore}/8)</strong><br>${fidelizacaoScore<5 ? 'Crie lista VIP. Mande mensagens personalizadas pós-venda.' : 'Lance clube de assinatura ou programa de pontos.'}</div>
      `;

      resultArea.innerHTML = `
        <div class="total-score-box">
          <div style="font-size:1.2rem;">PONTUAÇÃO TOTAL</div>
          <div class="score-number">${totalScore}/32</div>
          <div class="diagnosis-level" style="color: ${diagnosisClass};">${diagnosisText}</div>
          <p style="margin-top:12px; opacity:0.9;">${actionSummary}</p>
        </div>
        
        <h3 style="font-family:'Cinzel'; margin-bottom:16px; color: #1A0808;">⚡ Ações imediatas</h3>
        <div class="action-cards">
          ${actionsHtml}
